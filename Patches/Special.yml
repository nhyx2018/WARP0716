CustomSpecials:
    title : SPECIAL CUSTOMIZATIONS
    mutex : false
    color : deeppink
    
    patches:
        - CustomShields:
            title : Enable Custom Shields
            recommend : no
            author : Neo-Mind , CrazyBebop
            desc : Enables custom shield sprites beyond the default set by loading shield definitions from lua files (similar to the Xray system). Required for servers with custom shield graphics.
        
        - CustomJobs:
            title : Enable Custom Jobs (Reforged)
            recommend : no
            author : CrazyBebop
            desc : Enables custom job classes beyond the official set by loading job definitions from lua files. Full rewrite for the 07-16 client — 10-phase binary patch covering job names, sprite paths, palettes, head sprites, display names (via Lua C API), and range checks. Required for servers with custom classes or modified job sprites.

        - CustomHomuns:
            title : Enable Custom Homunculi
            recommend : no
            author : Neo-Mind
            desc : Enables custom homunculus types beyond the official set using lua files. Uses the same <b>'ReqJobName'</b> function as custom jobs, so no extra configuration files are needed beyond the job lua.

        - AddLuaOverrides:
            title : Add Chris' lua overrides [Experimental]
            recommend : no
            author : llchrisll , Neo-Mind
            desc : Loads additional lua override files by llchrisll that extend and patch the client's existing lua tables and functions. Adds quality-of-life improvements and fixes. See <a href="https://llchrisll.github.io/ROTPDocs/addons/cls/?h=lua">documentation</a> for the full list of changes. Experimental.

        - AllowAPBarforAllJobs:
            title : Allow AP Bar for all Jobs
            recommend : no
            author : Skylove, Singe-Horizontal
            desc : Displays the AP (Activity Points) bar for all job classes, not just 4th jobs. Internally treats every class as a 4th job for the AP gauge check. Useful for servers that give AP to all classes.

        - RemoveMaxNumbersLimit:
            title : Remove the limit of max number displayed in damage/heal
            recommend : no
            author : 4144
            desc : Removes the cap on displayed damage, healing, and other floating numbers. Without this, very large numbers get clamped to a maximum display value. Required for high-rate servers with large damage output.

CustomSkills:
    title : SKILL CUSTOMIZATIONS
    mutex : false
    color : deeppink
    
    patches:
        - CustomPlayerSkills:
            title : Enable Custom Player skills [Experimental]
            recommend : no
            author : Unknown
            desc : Enables custom player skills beyond the official skill list by loading definitions from lua files. Required for servers that add new skills. Experimental -- may require careful lua configuration.
        
        - CustomHomunSkills:
            title : Enable Custom Homunculus skills [Experimental]
            recommend : no
            author : Unknown
            desc : Enables custom homunculus skills beyond the official list by loading definitions from lua files. Required for servers that add new homunculus abilities. Experimental.
        
        - CustomMerceSkills:
            title : Enable Custom Mercenary skills [Experimental]
            recommend : no
            author : Unknown
            desc : Enables custom mercenary skills beyond the official list by loading definitions from lua files. Required for servers that add new mercenary abilities. Experimental.

