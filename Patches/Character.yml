CustomChar:
    title : CHARACTER CUSTOMIZATION
    mutex : false
    color : darkorchid
    
    patches:
        - OfficialPal:
            title : Use official cloth palettes
            recommend : no
            author : Neo-Mind
            desc : Forces the client to use Gravity's official cloth color palettes on all langtypes. <b>WARNING:</b> Incompatible with the 'Enable Custom Jobs' patch.
        
        - NoGMSprite:
            title : Disable GM sprite
            recommend : no
            author : Neo-Mind
            desc : Hides the special GM sprite (the yellow character) while keeping all GM functionality intact, including the yellow name color and admin right-click menu. GMs appear as their normal job class.
        
        - ShowBGEmblem:
            title : Enable Emblem hover for BG [Experimental]
            recommend : no
            author : Neo-Mind
            desc : Displays guild emblems above characters in Battleground maps, the same way they appear during Guild vs Guild (WoE). Helps identify team members in BG. Experimental -- may have visual quirks.
        
        - RestoreModelCulling:
            title : Restore model culling
            recommend: no
            author : Curiosity , Neo-Mind
            desc : Makes 3D models (buildings, walls, objects) that block your view of the player character turn transparent. Improves visibility in areas with large obstructing models.
        
        - Intravision:
            title : Always see hidden/cloaked objects
            recommend : no
            author : Secret, A.K.M. , Neo-Mind
            desc : Makes hidden and cloaked characters/objects always visible as dark silhouettes, as if the player permanently has the Intravision buff. Useful for GMs or testing -- gives an unfair advantage in PvP.
        
        - CustomQSDelay:
            title : Customize Quick Switch delay
            recommend : no
            author : mrjnumber1
            desc : Changes the cooldown delay (in ticks) for the quick equipment swap feature. Lower values allow faster gear switching; higher values enforce a longer wait between swaps.
        
        - AllowPL2Leave:
            title : Allow party leader to leave
            recommend : no
            author : Andrei Karas (4144) , Neo-Mind
            desc : Allows the party leader to leave the party when no other members are on the same map. By default, the client prevents the leader from leaving while the party still exists.
        
        - AllowSkillSpam:
            title : Allow spam skills by hotkey
            recommend : no
            author : Neo-Mind, Functor , Andrei Karas (4144) , CrazyBebop , Victor Hugo
            desc : Allows rapid skill casting by holding down a hotkey instead of having to press it repeatedly. Removes the client-side cooldown between hotkey activations.
        
        - AllowGuildInClan:
            title : Allow guild activities in clan
            recommend : no
            author : Functor, Secret , Neo-Mind
            desc : Removes the client-side restriction that blocks guild features (creating/joining guilds, GvG, etc.) while the player is a member of a clan. Allows both memberships to coexist.
        
        - RestoreAutoFollow:
            title : Restore auto follow
            recommend : no
            author : Andrei Karas (4144) , Neo-Mind
            desc : Restores the Shift+Right-Click auto-follow feature that was removed in RO Zero clients. Allows players to automatically follow another character.
            
        - CustomAFStopDelay:
            title : Customize auto follow stop delay
            recommend : no
            author : Andrei Karas (4144)
            desc : Changes the delay before auto-follow stops after the target moves out of range. Lower values make the character stop sooner; higher values keep following longer.
        
        - ShowGvGDamage:
            title : Show Damage for GvG
            recommend : no
            author : Andrei Karas (4144) , X-EcutiOnner
            desc : Shows damage numbers on Guild vs Guild (WoE) maps. By default, the client hides all damage digits during GvG to reduce visual clutter, but this makes it hard to gauge effectiveness.

        - IncreaseHairsLimit:
            title     : Increase Human/Doram Hair Limit
            recommend : no
            author    : Neo-Mind ,Skylove
            desc      : Raises the maximum hairstyle ID for Human and Doram characters up to 999. Required for servers that add custom hairstyles beyond the default limit.

