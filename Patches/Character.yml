CustomAutoFollow:
    title : AUTO FOLLOW CUSTOMIZATION
    mutex : true
    
    patches:
        - NoAutoFollow:
            title : Disable auto follow
            recommend : no
            author : Functor , Neo-Mind
            desc : Completely disables the Shift+Right-Click auto-follow feature. Use on servers where auto-follow is considered an exploit or is not desired.
        
        - DecrAFDelay:
            title : Decrease auto follow delay
            recommend : no
            author : CH.C (jchcc)
            desc : Reduces the initial delay before auto-follow starts moving after Shift+Right-Click. Lower values make the character begin following sooner.

CustomAura:
    title : AURA CUSTOMIZATION
    mutex : false
    
    patches:
        - CustomAuraSprites:
            title : Customize Aura sprites
            recommend : no
            author : Shinryo
            desc : Separates aura sprites from warp portal effects by using dedicated files (aurafloat.tga and auraring.bmp in 'data\\texture\\effect'). Prevents high-level character auras from visually interfering with warp portals.
        
        - CustomAuraLimits:
            title : Customize Aura display limits
            recommend : no
            author : Neo-Mind
            desc : Customizes which character classes and levels display the standard aura effect. Set minimum levels and allowed job classes for aura visibility to match your server's progression system.

CustomChatColor:
    title : <font color="#9F00EF">CHA</font><font color="#5F00FF">T CO</font><font color="blue">LOR </font><font color="green">CUS</font><font color="yellow">TOM</font><font color="orange">IZA</font><font color="red">TION</font>
    mutex : false
    
    patches:
        - CustomGMColor:
            title : Customize chat color (GM)
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : Changes the color of GM chat messages to a custom hex value. Default is ffff00 (yellow). Use to make GM announcements stand out in your preferred color.
    
        - CustomGuildColor:
            title : Customize chat color (Guild)
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : Changes the color of guild chat messages to a custom hex value. Default is b4ffb4 (light green).
        
        - CustomPartyColor:
            title : Customize chat color (Party - Others)
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : Changes the color of party chat messages from other members to a custom hex value. Default is ffc8c8 (pinkish).
        
        - CustomPartyColorSelf:
            title : Customize chat color (Party - Self)
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : Changes the color of your own party chat messages to a custom hex value. Default is ffc800 (orange).
        
        - CustomPublicColor:
            title : Customize chat color (Public - Others)
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : Changes the color of public chat messages from other players to a custom hex value. Default is ffffff (white).
        
        - CustomPublicColorSelf:
            title : Customize chat color (Public - Self)
            recommend : no
            author : Ai4rei/AN , Shakto
            desc : Changes the color of your own public chat messages to a custom hex value. Default is 00ff00 (green).

SkipCheatCheck:
    title : SKIP CHEATER CHECK
    mutex : false
    
    patches:
        - SkipInFriendList:
            title : Skip Friend list cheat check
            recommend : no
            author : Ai4rei/AN
            desc : Disables the "possible impersonation" warning when receiving a PM from someone whose name resembles a friend on your list. The warning is meant to detect name spoofing but causes false positives.
        
        - SkipInGuildList:
            title : Skip Guild Member cheat check
            recommend : no
            author : Ai4rei/AN
            desc : Disables the "possible impersonation" warning when receiving a PM from someone whose name resembles a guild member. Same as the friend list version but for guild members.

WalkDelay:
    title : WALK DELAY
    mutex : true
    
    patches:
        - NoWalkDelay:
            title : Remove Walk Delay
            recommend : no
            author : MegaByte , X-EcutiOnner
            desc : Removes the delay between walk-click inputs entirely, allowing immediate movement response. <b>Note:</b> May cause the client to send duplicate movement packets to the server.
        
        - CustomWalkDelay:
            title : Customize Walk Delay
            recommend : no
            author : MegaByte , X-EcutiOnner
            desc : Changes the delay between walk-click inputs to a custom value (in milliseconds). Lower values make movement more responsive. <b>Note:</b> Very low values may cause the client to send duplicate movement packets.

ResButtonVis:
    title : RESURRECT BUTTON VISIBILITY
    mutex : true
    color : darkorange
    
    patches:
        - HideResButton:
            title : Skip Resurrection button
            recommend : no
            author : Shinryo
            desc : Hides the Token of Ziegfried resurrection button when the player dies, even if one is in inventory. Use on servers where self-resurrection is not desired or the token has been repurposed.
        
        - ShowResButton:
            title : Always show Resurrection button
            recommend : no
            author : Neo-Mind
            desc : Always shows the Token of Ziegfried resurrection button on death regardless of the map type. By default, the button is hidden on certain map types like PvP or GvG maps.
