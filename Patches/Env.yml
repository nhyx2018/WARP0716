CustomEnv:
    title : ENVIRONMENT CUSTOMIZATION
    mutex : false
    
    patches:
        - HKLMtoHKCU:
            title : HKLM To HKCU
            recommend : no
            author : Shinryo
            desc : Switches registry access from HKEY_LOCAL_MACHINE to HKEY_CURRENT_USER. Allows the client to save settings without admin privileges, which is required on shared or restricted PCs.
            
        
        - NoAdminNeeded:
            title : Remove admin privilege requirement
            recommend : no
            author : X-EcutiOnner
            desc : Removes the client's requirement for administrator privileges, so it launches without the UAC elevation prompt. Useful for players who cannot or prefer not to run the game as admin.
        
        - LoadClientPlugins:
            title : Always load client plugins [Experimental]
            recommend : no
            author : Secret
            desc : Forces loading of client plugins (3rd party DLLs in the plugins folder) regardless of the client's sound configuration. Normally plugins only load when sound is enabled.
        
        - NoMultiWindow:
            title : Disable multiple windows
            recommend : no
            author : Shinryo , Ai4rei/AN
            desc : Prevents launching more than one game client at a time on all langtypes. Blocks multi-clienting by showing an error if a second instance is opened.
        
        - CustomMinResolution:
            title : Customize minimum screen resolution
            recommend : no
            author : Andrei Karas (4144)
            desc : Changes the minimum allowed screen resolution from the default 1024x768 to custom values. Useful for supporting smaller resolutions on older hardware or for testing.
        
        - IgnoreDebugger:
            title : Ignore Debugger
            recommend : no
            author : Andrei Karas (4144)
            desc : Disables the IsDebuggerPresent() anti-debug check, allowing the client to run under a debugger. Intended for development and reverse engineering only -- do not use on production clients distributed to players.

#        - IncreaseLightmapQuality:
#            title : Increase lightmap quality (4x)
#            recommend : no
#            author : Andre , CrazyBebop
#            desc : Increases lightmap subdivision from 1 to 4, resulting in 4x higher resolution ground shadows and sharper lighting.

        - DisableIndoorRSW:
            title : Disable indoor RSW lighting
            recommend : no
            author : Skylove , CrazyBebop
            desc : Disables the IndoorRswTable.txt lookup that forces fixed camera angles and lighting on indoor maps. Grants free camera rotation indoors, similar to the NoCameraLock patch but specifically targeting RSW-based indoor restrictions.

        - RemovePremiumService:
            title : Remove Premium Service text
            recommend : no
            author : Victor Hugo
            desc : Removes the "Premium Service" text from the character selection screen. This text is irrelevant on servers since there is no premium subscription system.

WindowFrame:
    title : WINDOW FRAME CUSTOMIZATION
    mutex : false
    
    patches:
        - EnableSysMenu:
            title : Enable title buttons
            recommend : yes
            author : Shinryo
            desc : Adds standard Windows title bar buttons (Minimize, Maximize, Close) and the application icon to the game window. Makes the client behave like a normal window instead of a borderless frame.
    
        - UseMiniTitle:
            title : Use Miniature title bar
            recommend : no
            author : Andrei Karas (4144)
            desc : Switches the game window to use a compact/miniature title bar instead of the standard-size one. Saves screen space while still showing window controls.
        
        - CustomWinTitle:
            title : Customize Window title
            recommend : no
            author : Shinryo
            desc : Changes the text shown in the game window's title bar to a custom string. Use to display your server name instead of the default "Ragnarok" title.
        
        - BorderlessFSW:
            title : Enable Borderless full screen
            recommend : no
            author : Andrei Karas (4144)
            desc : Enables borderless fullscreen mode -- removes the window frame and borders when the game resolution matches your screen resolution. Provides a seamless fullscreen experience while allowing easy Alt-Tab.

ClientArgs:
    title : CLIENT ARGUMENTS
    mutex : false
    
    patches:
        - No1and1Arg:
            title : Disable '1*1' arguments
            recommend : yes
            author : Shinryo
            desc : Removes the requirement for launcher arguments (1rag1, 1sak1, etc.) so the client can be started directly by double-clicking the exe. Without this, the client refuses to launch unless opened through a patcher.

        - IgnoreAccArg:
            title : Ignore '/account:' argument
            recommend : no
            author : Secret
            desc : Makes the client ignore the <b>/account:</b> command-line argument. Prevents players from overriding the server's clientinfo.xml with a custom one, which could be used to redirect connections.

EnableIcon:
    title : ENABLE ICON
    mutex : true
    
    patches:
        - RestoreIcon:
            title : Restore Inbuilt App icon
            recommend : yes
            author : Neo-Mind
            desc : Restores the original Ragnarok Online icon embedded in the executable instead of showing the generic Windows application icon. Fixes the missing icon in the taskbar and window title.
        
        - CustomIcon:
            title : Customize App icon
            recommend : no
            author : Neo-Mind
            desc : Replaces the application icon with a custom .ico file of your choice (any size and bit depth). For Win7 and later, use <b><font color='deepskyblue'>256x256 32-bit along with a 16x16 version</b><font>.<br><br>Older clients have a limit of 3 icon sizes, so you may need to select which resolutions to include.

AlterPriority:
    title : PRIORITY ALTERATION
    mutex : false
    
    patches:
        - Idle2NormalPriority:
            title : Change Priority (Idle to Normal)
            recommend : no
            author : Andrei Karas (4144)
            desc : Raises the thread priority of the game when its window is inactive from Idle to Normal. Prevents the game from slowing down significantly when alt-tabbed or in the background.
        
        - Normal2HighPriority:
            title : Change Priority (Normal to High)
            recommend : no
            author : Andrei Karas (4144)
            desc : Raises the thread priority of the active game window from Normal to High. Gives the client more CPU time, which can improve performance on systems running many background applications.
