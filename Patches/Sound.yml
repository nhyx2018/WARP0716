CustomSound:
    title : SOUND CUSTOMIZATION
    mutex : false
    
    patches:
        - Enable44kHzAudio:
            title : Enable 44.1 kHz audio sampling frequency
            recommend : no
            author : CH.C (jchcc)
            desc : Upgrades the audio sampling rate from the default (22 kHz) to 44.1 kHz (CD quality). Improves sound effect and BGM clarity at a slight increase in memory usage.
        
        - AutoMute:
            title : Auto mute audio [Experimental]
            recommend : no
            author : CH.C (jchcc)
            desc : Automatically mutes all game audio when the client window loses focus (e.g., when alt-tabbed). Audio resumes when the window is active again. Experimental -- may not work with all sound configurations.
        
        - NoBGMAudio:
            title : Disable BGM audio
            recommend : no
            author : Andrei Karas (4144) , X-EcutiOnner
            desc : Disables background music loading from mp3NameTable.txt, preventing BGM from playing on any map. Use if you want a completely silent game or handle music through external means.

