CustomNW:
    title : NETWORK CUSTOMIZATION
    mutex : false
    color : peru	
    
    patches:
        - SendMD5Hash:
            title : Send MD5 hash packet
            recommend : no
            author : GreenBox , Neo-Mind
            desc : Makes the client send its own MD5 hash to the server on login for all langtypes. Used for integrity verification to detect modified client executables. Only enable if your server is configured to receive and check this packet.
        
        - NoNagle:
            title : Disable nagle algorithm
            recommend : yes
            author : Shinryo
            desc : Disables TCP Nagle buffering so packets are sent immediately. Reduces input lag and improves responsiveness at the cost of slightly more network traffic. Recommended for most servers.
        
        - EnableProxy:
            title : Enable proxy support
            recommend : no
            author : Ai4rei/AN , Neo-Mind,Skylove
            desc : Ignores the IP addresses sent by the server when transitioning between login, char, and map servers. Keeps the client connecting to the address from clientinfo.xml instead. Required when playing through a proxy, VPN, or when the server reports internal LAN addresses.
            
#        - NoHardCodedAddr:
#            title : Remove hardcoded address/port
#            recommend : yes
#            author :  Andrei Karas (4144)
#            desc : Remove hardcoded connection addresses and ports.
        
        - EnableHttpEmblem:
            title : Fix HTTP emblem in client
            recommend : no
            author : CH.C (jchcc)
            desc : Fixes guild emblem loading via HTTP on clients that have the cheat defender enabled. Requires an HTTP emblem service running on your server.
            
        - CustomMerchantURL:
            title : Customize Merchant store URLs
            recommend : no
            author : CH.C (jchcc)
            desc : Changes the hardcoded URLs used for saving and loading Merchant Store (vending) data to custom ones. Requires an HTTP service on your server to handle merchant store requests.
        
        - SendClientFlags :
            title : Send client flags
            recommend : yes
            author : Andrei Karas (4144)
            desc : Sends the client's feature flags to the server during login, keeping client and server in sync about which features are supported. Prevents mismatches that can cause missing UI elements or broken functionality.
            


CustomEncKeys:
    title : ENCRYPTION KEY CUSTOMIZATION
    mutex : false

    patches:
        - CustomFirstKey:
            title : Customize Packet Key (1st)
            recommend : no
            author : Shakto , Neo-Mind
            desc : Sets a custom value for the 1st packet encryption key. Must match the key configured on your server. <b>WARNING:</b> Do not combine with 'Disable Map packet encryption' -- use one approach or the other.
            needs : NoEncrForLC
        
        - CustomSecondKey:
            title : Customize Packet Key (2nd)
            recommend : no
            author : Shakto , Neo-Mind
            desc : Sets a custom value for the 2nd packet encryption key. Must match the key configured on your server. <b>WARNING:</b> Do not combine with 'Disable Map packet encryption' -- use one approach or the other.
            needs : NoEncrForLC
        
        - CustomThirdKey:
            title : Customize Packet Key (3rd)
            recommend : no
            author : Shakto , Neo-Mind
            desc : Sets a custom value for the 3rd packet encryption key. Must match the key configured on your server. <b>WARNING:</b> Do not combine with 'Disable Map packet encryption' -- use one approach or the other.
            needs : NoEncrForLC

DisableEncr:
    title : DISABLE ENCRYPTION
    mutex : false
    
    patches:
        - NoPacketEncr:
            title : Disable Map packet encryption
            recommend : no
            author : Ai4rei/AN
            desc : Disables packet obfuscation (encryption) for communication with the map server. Simplifies packet handling on servers that do not use encryption.<br> Also known as 'Skip Packet Obfuscation'.
        
        - NoEncrForLC:
            title : Disable Login/Char packet encryption
            recommend : no
            author : Neo-Mind
            desc : Disables packet encryption for communication with the login and character servers. Required by most server emulators that do not implement Gravity's encryption handshake.
        
        - NoPassEncr:
            title : Disable Login password encryption
            recommend : yes
            author : Andrei Karas (4144) , Jchcc
            desc : Disables password encryption in the old login packet (0x64) for langtypes 4 and 7. Required for servers using plaintext or bcrypt password authentication with these langtypes. <b>WARNING:</b> Conflicts with 'Use SSO Login Packet' -- do not enable both.
            needs : UseOldLogin
